<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stock Predictor</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
    }
    input, select, button {
      margin: 10px 0;
      padding: 8px;
      width: 100%;
      max-width: 300px;
    }
    .result {
      margin-top: 20px;
      padding: 15px;
      background-color: #f0f0f0;
      border-radius: 6px;
    }
  </style>
</head>
<body>
  <h1>📈 Stock Prediction</h1>

  <label for="ticker">Enter Ticker Symbol:</label>
  <input id="ticker" type="text" placeholder="e.g. UPS">

  <label for="horizon">Select Prediction Horizon:</label>
  <select id="horizon">
    <option value="hour">Next Hour</option>
    <option value="day">Next Day</option>
    <option value="week">Next Week</option>
    <option value="month">Next Month</option>
  </select>

  <button onclick="getPrediction()">Predict</button>

  <div class="result" id="result">
    Prediction results will appear here.
  </div>

  <script>
    async function getPrediction() {
      const ticker = document.getElementById('ticker').value.trim().toUpperCase();
      const horizon = document.getElementById('horizon').value;

      if (!ticker) {
        alert('Please enter a ticker symbol.');
        return;
      }

      const url = `http://127.0.0.1:8000/predict/${ticker}?horizon=${horizon}`;
      try {
        const response = await fetch(url);
        if (!response.ok) {
          throw new Error(`Server responded with status ${response.status}`);
        }
        const data = await response.json();
        document.getElementById('result').innerHTML = `
          <strong>Prediction for ${ticker} (${horizon}):</strong><br />
          📊 Predicted Close: <strong>$${data.predicted_next_close}</strong><br />
          🧠 MSE: <strong>${data.model_mse}</strong><br />
          🧩 Used Models: <br />
          <ul>${data.used_models.map(m => `<li>${m}</li>`).join('')}</ul>
        `;
      } catch (err) {
        document.getElementById('result').innerHTML = `
          ❌ Error: ${err.message}
        `;
      }
    }
  </script>
</body>
</html>
