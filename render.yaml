services:
  - type: web
    name: prediqt-api
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ENV
        value: prod
      - key: RUN_TRAINER_SCHEDULER
        value: "0"
      - key: INTERNAL_SYNC_TOKEN
        sync: false
      - key: NEWS_API_KEY
        sync: false
      - key: FRED_API_KEY
        sync: false
  - type: worker
    name: prediqt-trainer
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python auto_trainer.py
    envVars:
      - key: ENV
        value: prod
      - key: RUN_TRAINER_SCHEDULER
        value: "1"
      - key: INTERNAL_SYNC_TOKEN
        sync: false
      - key: PREDIQT_API_URL
        sync: false
      - key: NEWS_API_KEY
        sync: false
      - key: FRED_API_KEY
        sync: false
