services:
  - type: web
    name: prediqt-api
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ENV
        value: prod
      - key: NEWS_API_KEY
        sync: false
      - key: FRED_API_KEY
        sync: false
