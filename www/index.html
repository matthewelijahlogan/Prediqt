<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/png" href="/img/favicon.png" sizes="16x16">
  <title>PredIQT</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="container">
    <header class="glass">
      <h1 class="app-title">
        <span class="pred">Pred</span><span class="iq">IQ</span><span class="t">t</span>
      </h1>
      <nav class="nav">
        <a href="index.html" class="active">Home</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
      </nav>
    </header>

    <main class="glass">
      <h2>Enter a Stock Ticker</h2>
      <input type="text" id="tickerInput" placeholder="e.g. AAPL">
      <button id="predictBtn" type="button">Predict</button>

      <div id="predictionsContainer" class="predictionsContainer">
        <div class="prediction">
          <strong>Next Hour Prediction:</strong> <span id="predictionHour">-</span>
        </div>
        <div class="prediction">
          <strong>Next Day Prediction:</strong> <span id="predictionDay">-</span>
        </div>
        <div class="prediction">
          <strong>Next Week Prediction:</strong> <span id="predictionWeek">-</span>
        </div>
        <div class="prediction">
          <strong>Next Month Prediction:</strong> <span id="predictionMonth">-</span>
        </div>
      </div>

      <hr>

      <h2>Real-Time Stock Data</h2>
      <div id="quoteContainer" class="quoteContainer">
        <div><strong>Price:</strong> <span id="quotePrice">-</span></div>
        <div><strong>Change:</strong> <span id="quoteChange">-</span></div>
        <div><strong>% Change:</strong> <span id="quotePercent">-</span></div>
        <div><strong>Volume:</strong> <span id="quoteVolume">-</span></div>
        <div><strong>Market Cap:</strong> <span id="quoteMarketCap">-</span></div>
        <div><strong>Sector:</strong> <span id="quoteSector">-</span></div>
      </div>
    </main>
  </div>

  <script>
    async function fetchPrediction(ticker, horizon, targetId) {
      const url = `/predict/${ticker}?horizon=${horizon}`;
      try {
        const response = await fetch(url);
        const data = await response.json();
        document.getElementById(targetId).textContent = data.predicted_next_close?.toFixed(2) ?? "N/A";
      } catch (err) {
        document.getElementById(targetId).textContent = "Error";
        console.error(err);
      }
    }

    async function fetchQuote(ticker) {
      const url = `/api/quote?ticker=${ticker}`;
      try {
        const response = await fetch(url);
        const data = await response.json();
        document.getElementById("quotePrice").textContent = data.price ?? "-";
        document.getElementById("quoteChange").textContent = data.change ?? "-";
        document.getElementById("quotePercent").textContent = data.percent_change?.toFixed(2) + "%" ?? "-";
        document.getElementById("quoteVolume").textContent = data.volume?.toLocaleString() ?? "-";
        document.getElementById("quoteMarketCap").textContent = data.market_cap?.toLocaleString() ?? "-";
        document.getElementById("quoteSector").textContent = data.sector ?? "-";
      } catch (err) {
        document.getElementById("quotePrice").textContent = "Error";
        console.error(err);
      }
    }

    document.getElementById("predictBtn").addEventListener("click", () => {
      const ticker = document.getElementById("tickerInput").value.trim().toUpperCase();
      if (!ticker) return;

      fetchPrediction(ticker, "hour", "predictionHour");
      fetchPrediction(ticker, "day", "predictionDay");
      fetchPrediction(ticker, "week", "predictionWeek");
      fetchPrediction(ticker, "month", "predictionMonth");

      fetchQuote(ticker);
    });
  </script>
</body>
</html>
