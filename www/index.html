<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PredIQT</title>

  <!-- Favicon -->
  <link rel="icon" href="/img/favicon.png" type="image/png" sizes="16x16">

  <!-- Custom Styles -->
  <link rel="stylesheet" href="css/style.css">

  <!-- Fonts fallback (optional Google Font if local fails) -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
</head>
<body>
  <div class="container">
    <!-- Header -->
    <header class="glass header-bar">
      <h1 class="app-title">
        <span class="pred">Pred</span><span class="iq">IQ</span><span class="t">t</span>
      </h1>
      <nav class="nav">
        <a href="index.html" class="active">Home</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
      </nav>
    </header>

    <!-- Main Content -->
    <main class="glass content-box">
      <section>
        <h2>🔍 Enter a Stock Ticker</h2>
        <input type="text" id="tickerInput" placeholder="e.g. AAPL">
        <button id="predictBtn" type="button">Predict</button>
      </section>

      <section class="predictionsContainer">
        <h3>📈 Predictions</h3>
        <div class="prediction"><strong>Next Hour:</strong> <span id="predictionHour">-</span></div>
        <div class="prediction"><strong>Next Day:</strong> <span id="predictionDay">-</span></div>
        <div class="prediction"><strong>Next Week:</strong> <span id="predictionWeek">-</span></div>
        <div class="prediction"><strong>Next Month:</strong> <span id="predictionMonth">-</span></div>
      </section>

      <hr>

      <section class="quoteContainer">
        <h3>🧾 Real-Time Stock Data</h3>
        <div><strong>Price:</strong> <span id="quotePrice">-</span></div>
        <div><strong>Change:</strong> <span id="quoteChange">-</span></div>
        <div><strong>% Change:</strong> <span id="quotePercent">-</span></div>
        <div><strong>Volume:</strong> <span id="quoteVolume">-</span></div>
        <div><strong>Market Cap:</strong> <span id="quoteMarketCap">-</span></div>
        <div><strong>Sector:</strong> <span id="quoteSector">-</span></div>
      </section>
    </main>
  </div>

  <!-- Ticker Bar -->
  <div class="ticker-bar"><span id="newsTicker">Your text here</span></div>

  <!-- JS Scripts -->
  <script src="js/script.js"></script>
  <script src="js/ticker.js"></script>
</body>
</html>
